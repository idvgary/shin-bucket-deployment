<text x="896" y="25" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#71717a">AWS CDK</text>
<rect x="960" y="14" width="72" height="16" rx="3" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.5"/>
<text x="996" y="25" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#16a34a">61.4× best</text>

<!-- DURATION SECTION -->
<rect x="4" y="60" width="524" height="28" fill="#f4f4f5"/>
<text x="28" y="79" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#52525b">HANDLER DURATION</text>
<text x="430" y="79" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#52525b">TIME</text>
<text x="500" y="79" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#52525b">GAIN</text>

<!-- Row 1: cold-create, y=88 -->
<text x="28" y="108" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#3f3f46">cold-create</text>
<rect x="160" y="96" width="260" height="16" rx="3" fill="#f4f4f5"/>
