<text x="42" y="344" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#09090b">Key Takeaway</text>
<text x="42" y="364" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#52525b">Shin skips unchanged objects in 0.46 s where AWS CDK re-syncs the full archive in 28.3 s.</text>
<text x="42" y="382" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#52525b">Cold deploys are 1.9× faster; incremental deploys are up to 61× faster with 58–63% less memory.</text>

