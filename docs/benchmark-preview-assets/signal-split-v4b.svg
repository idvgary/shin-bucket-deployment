<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="460" viewBox="0 0 1060 460" role="img" aria-labelledby="title desc">
<title id="title">ShinBucketDeployment vs AWS BucketDeployment benchmark comparison</title>
<desc id="desc">Benchmark chart comparing Lambda handler duration and max memory usage. Lower values are better.</desc>
<defs>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="0.6" fill="#d4d4d8" opacity="0.5"/>
  </pattern>
  <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#6366f1"/>
    <stop offset="1" stop-color="#8b5cf6"/>
  </linearGradient>
</defs>

<!-- Canvas -->
<rect width="1060" height="460" fill="#fafafa"/>
<rect width="1060" height="460" fill="url(#dots)"/>

<!-- Accent stripe left edge -->
<rect width="4" height="460" fill="url(#accent)"/>

<!-- Header row: y=0..60 -->
<rect x="4" y="0" width="1056" height="60" fill="#ffffff"/>
<rect x="4" y="59" width="1056" height="1" fill="#e4e4e7"/>
<text x="28" y="26" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#09090b">ShinBucketDeployment</text>
<text x="248" y="26" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="400" fill="#71717a">vs AWS BucketDeployment</text>
<text x="28" y="46" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#a1a1aa">1024 MiB · tiny-many · 2,584 objects · 7.8 MiB bundle</text>

<!-- Legend: top-right -->
<rect x="820" y="16" width="10" height="10" rx="2" fill="#18181b"/>
<text x="836" y="25" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#3f3f46">Shin</text>
