<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
<title id="title">ShinBucketDeployment vs AWS BucketDeployment benchmark comparison</title>
<desc id="desc">Benchmark chart comparing Lambda handler duration and max memory usage. Lower values are better.</desc>
<defs>
  <linearGradient id="shinBar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#18181b"/>
    <stop offset="1" stop-color="#3f3f46"/>
  </linearGradient>
  <linearGradient id="awsBar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#e4e4e7"/>
    <stop offset="1" stop-color="#d4d4d8"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="1200" height="480" fill="#ffffff"/>
<rect width="1200" height="1" fill="#e4e4e7"/>

<!-- Header -->
<g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <text x="40" y="38" font-size="20" font-weight="700" fill="#09090b" letter-spacing="-0.3">ShinBucketDeployment <tspan font-weight="400" fill="#71717a">vs AWS BucketDeployment</tspan></text>
  <text x="40" y="56" font-size="12" font-weight="400" fill="#a1a1aa">1024 MiB · tiny-many · 2,584 objects · 7.8 MiB</text>
</g>

<!-- Legend -->
<g transform="translate(900, 28)" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <rect width="10" height="10" rx="2" fill="#18181b"/>
  <text x="14" y="9" font-size="11" font-weight="500" fill="#3f3f46">Shin</text>
  <rect x="56" width="10" height="10" rx="2" fill="#e4e4e7" stroke="#d4d4d8" stroke-width="0.5"/>
  <text x="70" y="9" font-size="11" font-weight="500" fill="#3f3f46">AWS CDK</text>
</g>

<!-- Divider -->
<rect x="40" y="72" width="1120" height="1" fill="#e4e4e7"/>

<!-- Left panel: Duration -->
<g transform="translate(40, 90)" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <text x="0" y="14" font-size="14" font-weight="600" fill="#09090b">Handler Duration</text>
  <text x="130" y="14" font-size="11" font-weight="400" fill="#a1a1aa">seconds · lower is better</text>

  <!-- cold-create -->
  <g transform="translate(0, 38)">
    <text x="0" y="12" font-size="12" font-weight="500" fill="#3f3f46">cold-create</text>
    <g transform="translate(140, 0)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="149" height="16" rx="3" fill="url(#shinBar)"/>
    </g>
    <g transform="translate(140, 20)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="284" height="16" rx="3" fill="url(#awsBar)" stroke="#d4d4d8" stroke-width="0.5"/>
    </g>
    <text x="446" y="12" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#09090b">14.3 s</text>
    <text x="446" y="30" font-family="JetBrains Mono, monospace" font-size="11" font-weight="400" fill="#71717a">27.3 s</text>
    <rect x="504" y="6" width="48" height="22" rx="4" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="0.5"/>
    <text x="528" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#09090b">1.92×</text>
  </g>

  <!-- forced-unchanged -->
  <g transform="translate(0, 94)">
    <text x="0" y="12" font-size="12" font-weight="500" fill="#3f3f46">forced-unchanged</text>
    <g transform="translate(140, 0)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="5" height="16" rx="2" fill="url(#shinBar)"/>
    </g>
    <g transform="translate(140, 20)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="295" height="16" rx="3" fill="url(#awsBar)" stroke="#d4d4d8" stroke-width="0.5"/>
    </g>
    <text x="446" y="12" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#09090b">0.46 s</text>
    <text x="446" y="30" font-family="JetBrains Mono, monospace" font-size="11" font-weight="400" fill="#71717a">28.3 s</text>
    <rect x="504" y="6" width="48" height="22" rx="4" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="0.5"/>
    <text x="528" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#09090b">61.4×</text>
  </g>

  <!-- sparse-update -->
  <g transform="translate(0, 150)">
    <text x="0" y="12" font-size="12" font-weight="500" fill="#3f3f46">sparse-update</text>
    <g transform="translate(140, 0)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="6" height="16" rx="2" fill="url(#shinBar)"/>
    </g>
    <g transform="translate(140, 20)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="300" height="16" rx="3" fill="url(#awsBar)" stroke="#d4d4d8" stroke-width="0.5"/>
    </g>
    <text x="446" y="12" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#09090b">0.62 s</text>
    <text x="446" y="30" font-family="JetBrains Mono, monospace" font-size="11" font-weight="400" fill="#71717a">28.8 s</text>
    <rect x="504" y="6" width="48" height="22" rx="4" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="0.5"/>
    <text x="528" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#09090b">46.2×</text>
  </g>

  <!-- prune-update -->
  <g transform="translate(0, 206)">
    <text x="0" y="12" font-size="12" font-weight="500" fill="#3f3f46">prune-update</text>
    <g transform="translate(140, 0)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="164" height="16" rx="3" fill="url(#shinBar)"/>
    </g>
    <g transform="translate(140, 20)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="296" height="16" rx="3" fill="url(#awsBar)" stroke="#d4d4d8" stroke-width="0.5"/>
    </g>
    <text x="446" y="12" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#09090b">15.8 s</text>
    <text x="446" y="30" font-family="JetBrains Mono, monospace" font-size="11" font-weight="400" fill="#71717a">28.4 s</text>
    <rect x="504" y="6" width="48" height="22" rx="4" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="0.5"/>
    <text x="528" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#09090b">1.8×</text>
  </g>
</g>

<!-- Vertical divider -->
<rect x="600" y="84" width="1" height="380" fill="#e4e4e7"/>

<!-- Right panel: Memory -->
<g transform="translate(632, 90)" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <text x="0" y="14" font-size="14" font-weight="600" fill="#09090b">Max Memory Used</text>
  <text x="138" y="14" font-size="11" font-weight="400" fill="#a1a1aa">MiB · lower is better</text>

  <!-- cold-create -->
  <g transform="translate(0, 38)">
    <text x="0" y="12" font-size="12" font-weight="500" fill="#3f3f46">cold-create</text>
    <g transform="translate(140, 0)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="111" height="16" rx="3" fill="url(#shinBar)"/>
    </g>
    <g transform="translate(140, 20)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="297" height="16" rx="3" fill="url(#awsBar)" stroke="#d4d4d8" stroke-width="0.5"/>
    </g>
    <text x="446" y="12" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#09090b">79 MiB</text>
    <text x="446" y="30" font-family="JetBrains Mono, monospace" font-size="11" font-weight="400" fill="#71717a">212 MiB</text>
    <rect x="510" y="6" width="44" height="22" rx="4" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="0.5"/>
    <text x="532" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#09090b">−63%</text>
  </g>

  <!-- forced-unchanged -->
  <g transform="translate(0, 94)">
    <text x="0" y="12" font-size="12" font-weight="500" fill="#3f3f46">forced-unchanged</text>
    <g transform="translate(140, 0)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="125" height="16" rx="3" fill="url(#shinBar)"/>
    </g>
    <g transform="translate(140, 20)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="300" height="16" rx="3" fill="url(#awsBar)" stroke="#d4d4d8" stroke-width="0.5"/>
    </g>
    <text x="446" y="12" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#09090b">89 MiB</text>
    <text x="446" y="30" font-family="JetBrains Mono, monospace" font-size="11" font-weight="400" fill="#71717a">214 MiB</text>
    <rect x="510" y="6" width="44" height="22" rx="4" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="0.5"/>
    <text x="532" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#09090b">−58%</text>
  </g>

  <!-- sparse-update -->
  <g transform="translate(0, 150)">
    <text x="0" y="12" font-size="12" font-weight="500" fill="#3f3f46">sparse-update</text>
    <g transform="translate(140, 0)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="125" height="16" rx="3" fill="url(#shinBar)"/>
    </g>
    <g transform="translate(140, 20)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="300" height="16" rx="3" fill="url(#awsBar)" stroke="#d4d4d8" stroke-width="0.5"/>
    </g>
    <text x="446" y="12" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#09090b">89 MiB</text>
    <text x="446" y="30" font-family="JetBrains Mono, monospace" font-size="11" font-weight="400" fill="#71717a">214 MiB</text>
    <rect x="510" y="6" width="44" height="22" rx="4" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="0.5"/>
    <text x="532" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#09090b">−58%</text>
  </g>

  <!-- prune-update -->
  <g transform="translate(0, 206)">
    <text x="0" y="12" font-size="12" font-weight="500" fill="#3f3f46">prune-update</text>
    <g transform="translate(140, 0)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="133" height="16" rx="3" fill="url(#shinBar)"/>
    </g>
    <g transform="translate(140, 20)">
      <rect width="300" height="16" rx="3" fill="#f4f4f5"/>
      <rect width="300" height="16" rx="3" fill="url(#awsBar)" stroke="#d4d4d8" stroke-width="0.5"/>
    </g>
    <text x="446" y="12" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#09090b">95 MiB</text>
    <text x="446" y="30" font-family="JetBrains Mono, monospace" font-size="11" font-weight="400" fill="#71717a">214 MiB</text>
    <rect x="510" y="6" width="44" height="22" rx="4" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="0.5"/>
    <text x="532" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#09090b">−56%</text>
  </g>
</g>

<!-- Bottom border -->
<rect x="0" y="479" width="1200" height="1" fill="#e4e4e7"/>
</svg>
