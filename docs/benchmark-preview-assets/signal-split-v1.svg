<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="550" viewBox="0 0 1180 550" role="img" aria-labelledby="title desc">
<title id="title">ShinBucketDeployment vs AWS BucketDeployment benchmark comparison</title>
<desc id="desc">Gaming hardware style benchmark chart comparing Lambda handler duration and max memory usage. Lower values are better.</desc>
<defs>
<linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#081018"/><stop offset="1" stop-color="#101923"/></linearGradient>
<linearGradient id="shin" x1="0" x2="1"><stop offset="0" stop-color="#12e29c"/><stop offset="0.55" stop-color="#19c8ff"/><stop offset="1" stop-color="#8bffdb"/></linearGradient>
<linearGradient id="aws" x1="0" x2="1"><stop offset="0" stop-color="#f04452"/><stop offset="0.55" stop-color="#ff6b1a"/><stop offset="1" stop-color="#ff9f1c"/></linearGradient>
<filter id="shadow" x="-20%" y="-40%" width="140%" height="180%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/></filter>
<filter id="textShadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00111f" flood-opacity="0.85"/></filter>
</defs>
