<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="380" viewBox="0 0 1100 380" role="img" aria-labelledby="title desc">
<title id="title">ShinBucketDeployment vs AWS BucketDeployment benchmark comparison</title>
<desc id="desc">Benchmark chart comparing Lambda handler duration and max memory usage. Lower values are better.</desc>
<defs>
  <linearGradient id="shinBar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#18181b"/>
    <stop offset="1" stop-color="#27272a"/>
  </linearGradient>
  <linearGradient id="awsBar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#e4e4e7"/>
    <stop offset="1" stop-color="#d4d4d8"/>
  </linearGradient>
</defs>

<!-- Canvas -->
<rect width="1100" height="380" fill="#fafafa"/>

<!-- Header -->
<rect width="1100" height="56" fill="#ffffff"/>
<rect y="55" width="1100" height="1" fill="#e4e4e7"/>
<text x="24" y="24" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#09090b">ShinBucketDeployment</text>
<text x="220" y="24" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="400" fill="#71717a">vs AWS BucketDeployment</text>
<text x="24" y="44" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a1a1aa">1024 MiB · tiny-many · 2,584 objects · 7.8 MiB</text>

<!-- Legend top-right -->
<rect x="860" y="14" width="10" height="10" rx="2" fill="#18181b"/>
<text x="876" y="23" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#3f3f46">Shin</text>
<rect x="920" y="14" width="10" height="10" rx="2" fill="#e4e4e7" stroke="#d4d4d8" stroke-width="0.5"/>
<text x="936" y="23" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#71717a">AWS CDK</text>
<text x="860" y="44" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#a1a1aa">Lower is better</text>

