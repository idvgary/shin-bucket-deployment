<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="516" viewBox="0 0 1080 516" role="img" aria-labelledby="title desc">
<title id="title">ShinBucketDeployment vs AWS BucketDeployment benchmark</title>
<desc id="desc">Benchmark comparing handler duration and memory usage. Lower is better.</desc>
<defs>
  <linearGradient id="shin" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#0ee89e"/>
    <stop offset="0.5" stop-color="#18d4f8"/>
    <stop offset="1" stop-color="#6ef0d0"/>
  </linearGradient>
  <linearGradient id="aws" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#e8384f"/>
    <stop offset="0.5" stop-color="#ff6a2b"/>
    <stop offset="1" stop-color="#ffa033"/>
  </linearGradient>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0a1018"/>
    <stop offset="1" stop-color="#0e1620"/>
  </linearGradient>
  <filter id="gS" x="-8%" y="-60%" width="116%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    <feColorMatrix type="matrix" values="0 0 0 0 0.06 0 0 0 0 0.85 0 0 0 0 0.7 0 0 0 0.6 0"/>
  </filter>
  <filter id="gA" x="-8%" y="-60%" width="116%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3.5"/>
    <feColorMatrix type="matrix" values="0 0 0 0 0.95 0 0 0 0 0.35 0 0 0 0 0.15 0 0 0 0.4 0"/>
  </filter>
  <filter id="rowHover" x="-1%" y="-10%" width="102%" height="120%">
    <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#18d4f8" flood-opacity="0.03"/>
  </filter>
  <filter id="badgeShadow" x="-20%" y="-30%" width="140%" height="160%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
  </filter>
</defs>

<!--
  STRUCTURE: v5 layout (vertical stack, fixed columns)
  COLORS: v2 palette (teal/cyan shin, orange/red aws, dark navy bg)

  Header:    y=0..56
  Section A: y=56..278  (header band + 4×50px rows)
  Divider:   y=278
  Section B: y=279..500 (header band + 4×50px rows)

  Columns:
    x=24   Label
    x=180  Bar (width=540)
    x=740  Shin value
    x=830  AWS value
    x=940  Delta badge
-->

<!-- Background -->
<rect width="1080" height="516" fill="url(#bgGrad)"/>

<!-- ═══ HEADER ═══ -->
<text x="24" y="26" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#f0f8ff" letter-spacing="-0.3">ShinBucketDeployment</text>
<text x="24" y="46" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#5a7a94">vs AWS BucketDeployment · 1024 MiB · tiny-many · 2,584 objects · 7.8 MiB</text>

<!-- Legend -->
<rect x="820" y="12" width="12" height="8" rx="2" fill="url(#shin)"/>
<text x="838" y="20" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#8ab8d0">SHIN</text>
<rect x="890" y="12" width="12" height="8" rx="2" fill="url(#aws)"/>
<text x="908" y="20" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#8ab8d0">AWS</text>
<text x="820" y="42" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#3d5a70">▼ lower is better</text>

<rect x="0" y="60" width="1080" height="1" fill="#1a2a38"/>

<!-- ═══ SECTION A: DURATION ═══ -->
<rect y="61" width="1080" height="22" fill="#0c1420"/>
<text x="24" y="76" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#4a6a80" letter-spacing="0.8">HANDLER DURATION</text>
<text x="740" y="76" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#4a6a80" letter-spacing="0.8">SHIN</text>
<text x="830" y="76" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#4a6a80" letter-spacing="0.8">AWS</text>
<text x="940" y="76" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#4a6a80" letter-spacing="0.8">GAIN</text>
<rect x="0" y="83" width="1080" height="1" fill="#142230"/>

<!-- A1: cold-create -->
<g filter="url(#rowHover)">
  <text x="24" y="112" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c8e0f0">cold-create</text>
</g>
<rect x="180" y="94" width="540" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="94" width="268" height="11" rx="5.5" fill="url(#shin)" filter="url(#gS)" opacity="0.5"/>
<rect x="180" y="94" width="268" height="11" rx="5.5" fill="url(#shin)"/>
<rect x="180" y="111" width="540" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="111" width="512" height="11" rx="5.5" fill="url(#aws)" filter="url(#gA)" opacity="0.35"/>
<rect x="180" y="111" width="512" height="11" rx="5.5" fill="url(#aws)" opacity="0.75"/>
<text x="740" y="112" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#6ef0d0">14.3s</text>
<text x="830" y="112" font-family="JetBrains Mono, monospace" font-size="12" font-weight="400" fill="#5a7a94">27.3s</text>
<rect x="930" y="98" width="60" height="22" rx="5" fill="#12202c" filter="url(#badgeShadow)"/>
<text x="960" y="112" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="800" fill="#f0f8ff">1.92×</text>
<rect x="24" y="134" width="1032" height="1" fill="#142230"/>

<!-- A2: forced-unchanged -->
<text x="24" y="162" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c8e0f0">forced-unchanged</text>
<rect x="180" y="144" width="540" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="144" width="9" height="11" rx="5.5" fill="url(#shin)"/>
<rect x="180" y="161" width="540" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="161" width="530" height="11" rx="5.5" fill="url(#aws)" filter="url(#gA)" opacity="0.35"/>
<rect x="180" y="161" width="530" height="11" rx="5.5" fill="url(#aws)" opacity="0.75"/>
<text x="740" y="162" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#6ef0d0">0.46s</text>
<text x="830" y="162" font-family="JetBrains Mono, monospace" font-size="12" font-weight="400" fill="#5a7a94">28.3s</text>
<rect x="930" y="148" width="60" height="22" rx="5" fill="#0a3028" stroke="#0ee89e" stroke-width="0.5" filter="url(#badgeShadow)"/>
<text x="960" y="162" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="800" fill="#6ef0d0">61.4×</text>
<rect x="24" y="184" width="1032" height="1" fill="#142230"/>

<!-- A3: sparse-update -->
<text x="24" y="212" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c8e0f0">sparse-update</text>
<rect x="180" y="194" width="540" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="194" width="12" height="11" rx="5.5" fill="url(#shin)"/>
<rect x="180" y="211" width="540" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="211" width="540" height="11" rx="5.5" fill="url(#aws)" filter="url(#gA)" opacity="0.35"/>
<rect x="180" y="211" width="540" height="11" rx="5.5" fill="url(#aws)" opacity="0.75"/>
<text x="740" y="212" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#6ef0d0">0.62s</text>
<text x="830" y="212" font-family="JetBrains Mono, monospace" font-size="12" font-weight="400" fill="#5a7a94">28.8s</text>
<rect x="930" y="198" width="60" height="22" rx="5" fill="#12202c" filter="url(#badgeShadow)"/>
<text x="960" y="212" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="800" fill="#f0f8ff">46.2×</text>
<rect x="24" y="234" width="1032" height="1" fill="#142230"/>

<!-- A4: prune-update -->
<text x="24" y="262" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c8e0f0">prune-update</text>
<rect x="180" y="244" width="540" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="244" width="296" height="11" rx="5.5" fill="url(#shin)" filter="url(#gS)" opacity="0.5"/>
<rect x="180" y="244" width="296" height="11" rx="5.5" fill="url(#shin)"/>
<rect x="180" y="261" width="540" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="261" width="533" height="11" rx="5.5" fill="url(#aws)" filter="url(#gA)" opacity="0.35"/>
<rect x="180" y="261" width="533" height="11" rx="5.5" fill="url(#aws)" opacity="0.75"/>
<text x="740" y="262" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#6ef0d0">15.8s</text>
<text x="830" y="262" font-family="JetBrains Mono, monospace" font-size="12" font-weight="400" fill="#5a7a94">28.4s</text>
<rect x="930" y="248" width="60" height="22" rx="5" fill="#12202c" filter="url(#badgeShadow)"/>
<text x="960" y="262" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="800" fill="#f0f8ff">1.8×</text>

<!-- ═══ DIVIDER ═══ -->
<rect x="0" y="284" width="1080" height="1" fill="#1a2a38"/>

<!-- ═══ SECTION B: MEMORY ═══ -->
<rect y="285" width="1080" height="22" fill="#0c1420"/>
<text x="24" y="300" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#4a6a80" letter-spacing="0.8">MAX MEMORY</text>
<text x="740" y="300" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#4a6a80" letter-spacing="0.8">SHIN</text>
<text x="830" y="300" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#4a6a80" letter-spacing="0.8">AWS</text>
<text x="940" y="300" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#4a6a80" letter-spacing="0.8">SAVED</text>
<rect x="0" y="307" width="1080" height="1" fill="#142230"/>

<!-- B1: cold-create -->
<text x="24" y="344" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c8e0f0">cold-create</text>
<rect x="180" y="324" width="540" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="324" width="199" height="11" rx="5.5" fill="url(#shin)" filter="url(#gS)" opacity="0.5"/>
<rect x="180" y="324" width="199" height="11" rx="5.5" fill="url(#shin)"/>
<rect x="180" y="341" width="540" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="341" width="534" height="11" rx="5.5" fill="url(#aws)" filter="url(#gA)" opacity="0.35"/>
<rect x="180" y="341" width="534" height="11" rx="5.5" fill="url(#aws)" opacity="0.75"/>
<text x="740" y="344" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#6ef0d0">79 MiB</text>
<text x="830" y="344" font-family="JetBrains Mono, monospace" font-size="12" font-weight="400" fill="#5a7a94">212 MiB</text>
<rect x="930" y="329" width="60" height="22" rx="5" fill="#0a3028" stroke="#0ee89e" stroke-width="0.5" filter="url(#badgeShadow)"/>
<text x="960" y="344" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="800" fill="#6ef0d0">−63%</text>
<rect x="24" y="364" width="1032" height="1" fill="#142230"/>

<!-- B2: forced-unchanged -->
<text x="24" y="394" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c8e0f0">forced-unchanged</text>
