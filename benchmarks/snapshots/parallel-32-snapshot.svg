<svg xmlns="http://www.w3.org/2000/svg" width="790" height="217" viewBox="0 0 790 217" role="img" aria-labelledby="title desc">
<title id="title">ShinBucketDeployment vs AWS BucketDeployment benchmark</title>
<desc id="desc">Benchmark comparing handler duration and memory usage. Lower is better.</desc>
<defs>
  <linearGradient id="shin" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#0ee89e"/><stop offset="0.5" stop-color="#18d4f8"/><stop offset="1" stop-color="#6ef0d0"/>
  </linearGradient>
  <linearGradient id="aws" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#e8384f"/><stop offset="0.5" stop-color="#ff6a2b"/><stop offset="1" stop-color="#ffa033"/>
  </linearGradient>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0a1018"/><stop offset="1" stop-color="#0e1620"/>
  </linearGradient>
  <filter id="gS" x="-8%" y="-60%" width="116%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    <feColorMatrix type="matrix" values="0 0 0 0 0.06 0 0 0 0 0.85 0 0 0 0 0.7 0 0 0 0.6 0"/>
  </filter>
  <filter id="gA" x="-8%" y="-60%" width="116%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3.5"/>
    <feColorMatrix type="matrix" values="0 0 0 0 0.95 0 0 0 0 0.35 0 0 0 0 0.15 0 0 0 0.4 0"/>
  </filter>
  <filter id="badgeShadow" x="-20%" y="-30%" width="140%" height="160%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
  </filter>
</defs>

<!-- Background -->
<rect width="790" height="217" fill="url(#bgGrad)"/>

<!-- Header -->
<text x="24" y="23" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#f0f8ff" letter-spacing="-0.3">ShinBucketDeployment</text>
<text x="24" y="43" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6f91a8">vs AWS BucketDeployment</text>
<text x="24" y="61" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#6f91a8">Profile: tiny-many · Lambda: 1024 MiB · Parallel: 32 · Assets: 2,584 objects / 7.8 MiB</text>
<rect x="655" y="22" width="12" height="8" rx="2" fill="url(#shin)"/>
<text x="673" y="30" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#8ab8d0">SHIN</text>
<rect x="725" y="22" width="12" height="8" rx="2" fill="url(#aws)"/>
<text x="743" y="30" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#8ab8d0">AWS</text>
<text x="655" y="52" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#6f91a8">▼ lower is better</text>
<rect x="0" y="71" width="790" height="1" fill="#1a2a38"/>

<rect y="72" width="790" height="22" fill="#0c1420"/>
<text x="24" y="87" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6f91a8" letter-spacing="0.8">HANDLER DURATION</text>
<text x="520" y="87" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6f91a8" letter-spacing="0.8">SHIN</text>
<text x="610" y="87" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6f91a8" letter-spacing="0.8">AWS</text>
<text x="710" y="87" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6f91a8" letter-spacing="0.8">FASTER</text>
<rect x="0" y="94" width="790" height="1" fill="#142230"/>
<text x="24" y="124" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#d8edf8">cold-create</text>
<rect x="180" y="106" width="320" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="106" width="43.25274725274725" height="11" rx="5.5" fill="url(#shin)" filter="url(#gS)" opacity="0.5"/>
<rect x="180" y="106" width="43.25274725274725" height="11" rx="5.5" fill="url(#shin)"/>
<rect x="180" y="123" width="320" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="123" width="320" height="11" rx="5.5" fill="url(#aws)" filter="url(#gA)" opacity="0.35"/>
<rect x="180" y="123" width="320" height="11" rx="5.5" fill="url(#aws)" opacity="0.75"/>
<text x="520" y="124" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#6ef0d0">3.69s</text>
<text x="610" y="124" font-family="JetBrains Mono, monospace" font-size="12" font-weight="400" fill="#5a7a94">27.3s</text>
<rect x="700" y="110" width="60" height="22" rx="5" fill="#082b35" stroke="#18d4f8" stroke-width="0.5" filter="url(#badgeShadow)"/>
<text x="730" y="125" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="800" fill="#6ef0d0">7.4×</text>
<rect x="0" y="144" width="790" height="1" fill="#1a2a38"/>
<rect y="145" width="790" height="22" fill="#0c1420"/>
<text x="24" y="160" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6f91a8" letter-spacing="0.8">MAX MEMORY</text>
<text x="520" y="160" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6f91a8" letter-spacing="0.8">SHIN</text>
<text x="610" y="160" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6f91a8" letter-spacing="0.8">AWS</text>
<text x="710" y="160" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6f91a8" letter-spacing="0.8">SAVED</text>
<rect x="0" y="167" width="790" height="1" fill="#142230"/>
<text x="24" y="197" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#d8edf8">cold-create</text>
<rect x="180" y="179" width="320" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="179" width="144.9056603773585" height="11" rx="5.5" fill="url(#shin)" filter="url(#gS)" opacity="0.5"/>
<rect x="180" y="179" width="144.9056603773585" height="11" rx="5.5" fill="url(#shin)"/>
<rect x="180" y="196" width="320" height="11" rx="5.5" fill="#12202c"/>
<rect x="180" y="196" width="320" height="11" rx="5.5" fill="url(#aws)" filter="url(#gA)" opacity="0.35"/>
<rect x="180" y="196" width="320" height="11" rx="5.5" fill="url(#aws)" opacity="0.75"/>
<text x="520" y="197" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#6ef0d0">96 MiB</text>
<text x="610" y="197" font-family="JetBrains Mono, monospace" font-size="12" font-weight="400" fill="#5a7a94">212 MiB</text>
<rect x="700" y="183" width="60" height="22" rx="5" fill="#082b35" stroke="#18d4f8" stroke-width="0.5" filter="url(#badgeShadow)"/>
<text x="730" y="198" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="800" fill="#6ef0d0">55%</text>
</svg>